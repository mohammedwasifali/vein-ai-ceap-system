<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clinical Data Entry</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

<header>
<h1>Clinical Data Entry</h1>
<p>Patient assessment interface</p>
</header>

<form id="patientForm">

<section>
<h2>Patient Information</h2>

<div class="grid">
<input type="text" placeholder="Patient ID" required>
<input type="number" placeholder="Age">
<select>
<option>Male</option>
<option>Female</option>
</select>
</div>

</section>

<section>
<h2>Clinical History</h2>

<div class="grid">
<select>
<option>Pain: None</option>
<option>Pain: Mild</option>
<option>Pain: Moderate</option>
<option>Pain: Severe</option>
</select>

<select>
<option>Swelling: No</option>
<option>Swelling: Yes</option>
</select>

<select>
<option>Skin Pigmentation: No</option>
<option>Skin Pigmentation: Yes</option>
</select>

<select>
<option>Active Ulcer: No</option>
<option>Active Ulcer: Yes</option>
</select>
</div>

</section>

<section>
<h2>Doppler Measurements</h2>

<div class="grid">
<select>
<option>Vein: GSV</option>
<option>Vein: SSV</option>
</select>

<input type="number" placeholder="Reflux Duration (seconds)">

<input type="number" placeholder="Vein Diameter (mm)">

<select>
<option>DVT: No</option>
<option>DVT: Yes</option>
</select>
</div>

</section>

<section>
<h2>rVCSS Score</h2>

<input type="number" placeholder="Enter rVCSS score">

</section>

<section>
<h2>Leg Image</h2>

<input type="file">

</section>

<button type="submit">Submit Record</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
