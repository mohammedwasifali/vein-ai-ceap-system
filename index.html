<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CVI Clinical Data Entry</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>CVI Clinical Data Entry</h1>
<p>Chronic Venous Disease Assessment System</p>
</header>

<div class="container">

<form id="patientForm">

<h2>Patient Information</h2>

<div class="row">
<input type="text" placeholder="Patient ID" required>
<input type="number" placeholder="Age">
<select>
<option>Male</option>
<option>Female</option>
</select>
</div>

<h2>Clinical History</h2>

<div class="row">
<select>
<option>Pain: None</option>
<option>Pain: Mild</option>
<option>Pain: Moderate</option>
<option>Pain: Severe</option>
</select>

<select>
<option>Swelling: No</option>
<option>Swelling: Yes</option>
</select>
</div>

<select>
<option>Skin Pigmentation: No</option>
<option>Skin Pigmentation: Yes</option>
</select>

<select>
<option>Active Ulcer: No</option>
<option>Active Ulcer: Yes</option>
</select>

<h2>Doppler Ultrasound Data</h2>

<div class="row">
<select>
<option>Vein: GSV</option>
<option>Vein: SSV</option>
</select>

<input type="number" placeholder="Reflux Duration (seconds)">
</div>

<div class="row">
<input type="number" placeholder="Vein Diameter (mm)">

<select>
<option>DVT: No</option>
<option>DVT: Yes</option>
</select>
</div>

<h2>rVCSS Score</h2>

<input type="number" placeholder="rVCSS Score">

<h2>Leg Image</h2>

<input type="file">

<br>

<button type="submit">Submit Record</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
